{% extends 'agency/base.html' %}
{% block title %}{{ title }} | Newspaper Agency Bakhtiyarpur{% endblock %}

{% block content %}
<div class="form-card text-center">
    <div style="font-size:4rem; margin-bottom:16px;">{{ icon }}</div>
    <h2 class="fw-bold mb-3" style="color:#166534;">{{ title }}</h2>

    <p class="mb-3" style="font-size:1rem; color:#374151;">{{ message|safe }}</p>

    <div class="alert-success-custom mb-4" style="font-size:.9rem; text-align:left;">
        <i class="bi bi-info-circle-fill me-2"></i>{{ sub_message }}
    </div>

    <a href="{% url 'agency:home' %}" class="btn-submit btn d-inline-block" style="max-width:280px;">
        <i class="bi bi-house-door-fill me-2"></i>Back to Home
    </a>
</div>
{% endblock %}
